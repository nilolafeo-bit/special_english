# Общие FAQ для главной страницы и страницы /faq/.
# Под-FAQ для каждого гайда лежат в самом файле гайда (front matter).

- question: "В каком формате я получу гайд после оплаты?"
  answer: >-
    Сразу после оплаты на ваш email приходит письмо с PDF-файлом.
    Для некоторых гайдов в комплект входят аудио-материалы и шаблоны
    документов — они приходят тем же письмом.

- question: "Можно ли оплатить картой российского банка?"
  answer: >-
    Да. Принимаем оплату картами российских и зарубежных банков, через
    СБП и электронные кошельки. Платёжная страница откроется после нажатия
    кнопки «Купить» на странице нужного гайда.

- question: "Подойдёт ли гайд при моём уровне английского?"
  answer: >-
    На странице каждого гайда указан целевой уровень (например, A2 → B1
    или B1 → B2). Если ваш уровень ниже, гайд будет сложным — рекомендуем
    сначала подтянуть базу. Если выше — материал будет слишком простым,
    стоит выбрать другой гайд.

- question: "Это курс с куратором или просто PDF?"
  answer: >-
    Это самостоятельный учебный материал в формате PDF. Здесь нет куратора,
    дедлайнов или live-сессий — это намеренный выбор: вы платите один раз
    и работаете в своём темпе. Зато внутри — конкретные скрипты, шаблоны
    и упражнения, которые работают без репетитора.

- question: "Можно ли вернуть деньги, если гайд не подошёл?"
  answer: >-
    Да, в течение 14 дней с момента покупки можно запросить возврат
    без объяснения причин. Напишите на aiinformatorbot@gmail.com с темой
    «Возврат» и укажите email, на который покупали.

- question: "Гайды обновляются?"
  answer: >-
    Да. Все владельцы получают обновления бесплатно. Особенно это касается
    гайдов с быстро меняющимся контекстом — Legal English (регуляторика),
    Logistics English (санкции, маршруты) и Relocation English (визовая практика).

- question: "Можно ли купить несколько гайдов со скидкой?"
  answer: >-
    Да, при покупке двух и более гайдов мы делаем скидку 15–25%.
    Напишите на aiinformatorbot@gmail.com, какие гайды интересуют, и мы
    пришлём персональную ссылку на оплату с применённой скидкой.
