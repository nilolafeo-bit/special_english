# Отзывы — плейсхолдеры. Замените на реальные после первых продаж.
# guide_slug привязывает отзыв к конкретному гайду (можно опустить — будет общий).

- author: "Алексей К."
  role: "Senior Backend Engineer, перешёл в EU-стартап"
  guide_slug: it-interview-english
  rating: 5
  text: >-
    Прошёл два круга интервью в немецкий стартап. На coding молчал бы,
